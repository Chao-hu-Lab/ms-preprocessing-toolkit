name: Build Desktop Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: "Upload as artifact (for testing without a tag)"
        type: boolean
        default: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows
          - os: macos-latest
            platform: macOS

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Determine package version
        id: meta
        shell: bash
        run: |
          project_version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              data = tomllib.load(fh)

          print(data["project"]["version"])
          PY
          )"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            package_version="${GITHUB_REF#refs/tags/}"
            if [[ "$package_version" != "v${project_version}" ]]; then
              echo "Tag ${package_version} does not match project version v${project_version}" >&2
              exit 1
            fi
          else
            package_version="v${project_version}-dev"
          fi

          artifact_stem="ms-preprocessing-${{ matrix.platform }}-${package_version}"

          echo "project_version=${project_version}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "artifact_stem=${artifact_stem}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pip install -e . pyinstaller

      - name: Build package
        run: pyinstaller ms-preprocessing.spec --clean --noconfirm
        env:
          PYTHONPATH: ms-core/src

      - name: Verify Windows executable
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          & "dist\ms-preprocessing.exe" --version

      - name: Verify macOS app bundle
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          ./dist/ms-preprocessing.app/Contents/MacOS/ms-preprocessing --version

      - name: Package Windows zip
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $artifactStem = "${{ steps.meta.outputs.artifact_stem }}"
          $stageDir = Join-Path $env:RUNNER_TEMP $artifactStem
          $archivePath = Join-Path "dist" "$artifactStem.zip"

          if (Test-Path $stageDir) {
            Remove-Item $stageDir -Recurse -Force
          }
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          New-Item -ItemType Directory -Path $stageDir | Out-Null
          Copy-Item "dist\ms-preprocessing.exe" (Join-Path $stageDir "$artifactStem.exe")
          Compress-Archive -Path $stageDir -DestinationPath $archivePath -Force

      - name: Package macOS zip
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          artifact_stem="${{ steps.meta.outputs.artifact_stem }}"
          stage_dir="$RUNNER_TEMP/$artifact_stem"
          archive_path="dist/${artifact_stem}.zip"

          rm -rf "$stage_dir" "$archive_path"
          mkdir -p "$stage_dir"
          cp -R "dist/ms-preprocessing.app" "$stage_dir/${artifact_stem}.app"
          ditto -c -k --sequesterRsrc --keepParent "$stage_dir" "$archive_path"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_stem }}
          path: dist/${{ steps.meta.outputs.artifact_stem }}.zip
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ms-preprocessing-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -R release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
