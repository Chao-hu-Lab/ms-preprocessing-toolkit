name: Build Windows Executable

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: "Upload as artifact (for testing without a tag)"
        type: boolean
        default: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      PLATFORM: Win

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e . pyinstaller

      - name: Build executable
        run: pyinstaller ms-preprocessing.spec --clean --noconfirm
        env:
          PYTHONPATH: ms-core/src

      - name: Rename executable with platform and version
        shell: bash
        run: mv dist/ms-preprocessing.exe "dist/ms-preprocessing-${PLATFORM}-${{ steps.version.outputs.tag }}.exe"

      - name: Verify executable
        run: |
          & "dist\ms-preprocessing-${{ env.PLATFORM }}-${{ steps.version.outputs.tag }}.exe" --version

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ms-preprocessing-${{ env.PLATFORM }}-${{ steps.version.outputs.tag }}
          path: dist/ms-preprocessing-${{ env.PLATFORM }}-${{ steps.version.outputs.tag }}.exe
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ms-preprocessing-${{ env.PLATFORM }}-${{ steps.version.outputs.tag }}.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
