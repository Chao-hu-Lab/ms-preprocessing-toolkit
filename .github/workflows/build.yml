name: Build Desktop Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: "Upload as artifact (for testing without a tag)"
        type: boolean
        default: true

# workflow_call 時 permissions 必須在頂層，不能放在 job 層級
permissions:
  contents: write

jobs:
  build:
    uses: Chao-hu-Lab/shared-workflows/.github/workflows/python-build.yml@main
    with:
      upload_artifact: ${{ inputs.upload_artifact || false }}
      spec-file: "ms-preprocessing.spec"
      executable-name: "ms-preprocessing"
      artifact-prefix: "ms-preprocessing"
